<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopUA — Онлайн-каталог</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Змінні (Світла тема) ────────────────────────────── */
    :root {
      --bg:       #f8f9fa;
      --surface:  #ffffff;
      --border:   #e9ecef;
      --accent:   #4f46e5;
      --accent2:  #ec4899;
      --text:     #1a1a2e;
      --muted:    #64748b;
      --card-bg:  #ffffff;
      --radius:   16px;
      --font-h:   'Syne', sans-serif;
      --font-b:   'Inter', sans-serif;
    }

    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; cursor: pointer; }
    img { display: block; max-width: 100%; }
    button { cursor: pointer; font-family: var(--font-b); border: none; outline: none; }

    /* ── Обгортка ────────────────────────────────────────── */
    .wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Навігація ───────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
    }
    .logo {
      font-family: var(--font-h);
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .logo em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-links { display: flex; gap: 8px; }
    .nav-link {
      padding: 8px 20px;
      border-radius: 50px;
      font-size: .92rem;
      font-weight: 500;
      color: var(--muted);
      transition: all .25s;
      border: 1px solid transparent;
    }
    .nav-link:hover { color: var(--accent); background: var(--border); }
    .nav-link.active {
      color: var(--accent);
      background: #eff6ff;
      border-color: #dbeafe;
    }

    /* ── Головна: Hero ───────────────────────────────────── */
    .hero {
      padding: 80px 0 60px;
      text-align: center;
      animation: fadeUp .7s ease both;
    }
    .hero-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 50px;
      background: #eef2ff;
      border: 1px solid #e0e7ff;
      font-size: .82rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    .hero-title {
      font-family: var(--font-h);
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -.03em;
      margin-bottom: 20px;
      color: #0f172a;
    }
    .hero-title em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 1.15rem;
      color: var(--muted);
      max-width: 580px;
      margin: 0 auto 36px;
    }
    .btn-catalog {
      padding: 16px 40px;
      border-radius: 50px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      font-family: var(--font-h);
      transition: all .2s;
      box-shadow: 0 10px 25px rgba(79, 70, 229, 0.2);
    }
    .btn-catalog:hover {
      background: #4338ca;
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(79, 70, 229, 0.3);
    }

    /* ── Features ────────────────────────────────────────── */
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px 0 80px;
    }
    .feature {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px;
      text-align: center;
      transition: all .3s;
    }
    .feature:hover { border-color: var(--accent); transform: translateY(-5px); }
    .feat-icon { font-size: 2.2rem; display: block; margin-bottom: 12px; }
    .feature strong { display: block; font-family: var(--font-h); font-size: 1.1rem; margin-bottom: 6px; color: #1e293b; }
    .feature p { color: var(--muted); font-size: .9rem; }

    /* ── Секції Каталогу та Товарів ────────────────────────── */
    .section-header { margin-bottom: 40px; text-align: left; }
    .section-title { font-family: var(--font-h); font-size: 2.2rem; font-weight: 800; color: #0f172a; }
    
    .cat-grid, .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    /* ── Картки ──────────────────────────────────────────── */
    .cat-card, .product-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px;
      transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .cat-card:hover, .product-card:hover {
      border-color: var(--accent);
      box-shadow: 0 20px 40px rgba(0,0,0,0.06);
      transform: translateY(-8px);
    }
    .cat-number { font-family: var(--font-h); font-size: 3rem; font-weight: 800; color: #f1f5f9; line-height: 1; margin-bottom: 15px; }
    .cat-name { font-family: var(--font-h); font-size: 1.4rem; color: #1e293b; margin-bottom: 12px; font-weight: 700; }
    
    .product-img-wrap { 
      background: #f8fafc; 
      margin: -30px -30px 20px -30px; 
      padding: 30px; 
      display: flex; 
      justify-content: center;
      border-bottom: 1px solid var(--border);
    }

    .product-price { font-family: var(--font-h); font-size: 1.3rem; font-weight: 700; color: var(--accent); }

    /* ── Кнопки дій ───────────────────────────────────────── */
    .btn-action {
      margin-top: auto;
      padding: 12px 24px;
      border-radius: 50px;
      background: #f1f5f9;
      color: var(--text);
      font-weight: 600;
      transition: all .2s;
      text-align: center;
      border: 1px solid transparent;
    }
    .btn-action:hover { background: var(--accent); color: #fff; }
    .btn-buy { background: #1e293b; color: #fff; }

    /* ── Specials Banner (Вимога 1.2.3) ───────────────────── */
    .specials-banner {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: var(--radius);
      padding: 40px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      gap: 30px;
      animation: fadeUp .7s ease both;
    }
    .specials-content h3 { font-family: var(--font-h); font-size: 1.8rem; margin-bottom: 10px; }
    .btn-specials {
      background: white;
      color: var(--accent);
      padding: 14px 30px;
      border-radius: 50px;
      font-weight: 700;
      font-family: var(--font-h);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    /* ── Анімації ────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer { 
      border-top: 1px solid var(--border); 
      padding: 40px 0; 
      text-align: center; 
      color: var(--muted); 
      margin-top: 60px;
    }
    
    #back-to-cat {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 24px;
        font-weight: 600;
        color: var(--accent);
        cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <div class="wrapper">
      <nav class="nav">
        <div class="logo">Shop<em>UA</em></div>
        <div class="nav-links">
          <a class="nav-link active" id="nav-home" href="index.html">Додому</a>
          <a class="nav-link" id="nav-catalog" href="#">Каталог</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <div class="wrapper" id="content">
      </div>
  </main>

  <footer>
    <div class="wrapper">
      <p>© 2026 <strong>ShopUA</strong> — Лабораторна робота №3. TypeScript & Ajax.</p>
    </div>
  </footer>

  <script type="module" src="main.js"></script>
</body>
</html>
